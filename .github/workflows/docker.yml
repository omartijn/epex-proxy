name: Docker

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  packages: write   # push to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── epex-proxy image ───────────────────────────────────────────────────

      - name: Metadata (epex-proxy)
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/epex-proxy
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push (epex-proxy)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          cache-from: type=gha,scope=proxy
          cache-to:   type=gha,scope=proxy,mode=max

      # ── caddy + SPA image ──────────────────────────────────────────────────

      - name: Metadata (caddy)
        id: meta-caddy
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/caddy
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push (caddy)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/caddy.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-caddy.outputs.tags }}
          labels: ${{ steps.meta-caddy.outputs.labels }}
          cache-from: type=gha,scope=caddy
          cache-to:   type=gha,scope=caddy,mode=max
